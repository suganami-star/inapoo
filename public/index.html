<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>【優先撮影エリアタイマー】#いなプーフォトフェス</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="landing">
  <main class="hero">
    <p class="eyebrow">COUNTDOWN TIMER APP</p>
    <h1>【優先撮影エリアタイマー】#いなプーフォトフェス</h1>
    <p>5つのグループタイマーを共有URLで閲覧できます。スタート・ストップ・リセットは管理者URLからのみ操作できます。</p>
    <button id="create" class="primary">新しいタイマーボードを作成</button>
    <div id="result" class="result hidden">
      <label>閲覧用URL
        <div class="urlBox"><input id="viewUrl" readonly><button id="copyView" type="button" class="ghost">コピー</button></div>
      </label>
      <label>管理者URL
        <div class="urlBox"><input id="adminUrl" readonly><button id="copyAdmin" type="button" class="ghost">コピー</button></div>
      </label>
      <a id="openAdmin" class="primary link" href="#">管理者画面を開く</a>
    </div>
  </main>
<script>
const result = document.getElementById('result');
const viewUrl = document.getElementById('viewUrl');
const adminUrl = document.getElementById('adminUrl');
const openAdmin = document.getElementById('openAdmin');
async function copy(v) { await navigator.clipboard.writeText(v); alert('コピーしました'); }
document.getElementById('create').addEventListener('click', async () => {
  const res = await fetch('/api/rooms', { method: 'POST' });
  const data = await res.json();
  viewUrl.value = data.viewUrl;
  adminUrl.value = data.adminUrl;
  openAdmin.href = data.adminUrl;
  result.classList.remove('hidden');
});
document.getElementById('copyView').addEventListener('click', () => copy(viewUrl.value));
document.getElementById('copyAdmin').addEventListener('click', () => copy(adminUrl.value));
</script>
</body>
</html>
